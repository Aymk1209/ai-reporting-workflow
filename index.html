<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 1: Dynamic AI Reporting Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <style>
        :root { --bg-primary: #0b0f19; --bg-secondary: #131c2e; --text-main: #f8fafc; --text-muted: #94a3b8; --accent-blue: #38bdf8; --accent-green: #34d399; --border-color: #334155; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { margin-bottom: 40px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        .badge { background: rgba(56, 189, 248, 0.1); color: var(--accent-blue); padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; display: inline-block; margin-bottom: 12px; }
        h1 { font-size: 2.2rem; margin-bottom: 8px; background: linear-gradient(to right, #f8fafc, #64748b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .panel { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; margin-bottom: 30px; }
        .panel-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
        .input-group input { background: #0f172a; border: 1px solid var(--border-color); padding: 10px; border-radius: 6px; color: #fff; font-size: 0.9rem; }
        .action-btn { background: #2563eb; color: #fff; border: none; padding: 12px 24px; border-radius: 6px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.95rem; }
        .action-btn:hover { background: #1d4ed8; }
        .output-box { background: #020617; border-left: 4px solid var(--accent-blue); padding: 20px; border-radius: 0 8px 8px 0; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; color: #cbd5e1; display: none; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <span class="badge">Project 1: Live Dynamic Input Mode</span>
        <h1>Dynamic AI Reporting Workflow</h1>
        <p style="color: var(--text-muted);">Enter any operational performance figures below to watch the analytical parsing logic execute dynamically.</p>
    </header>

    <div class="panel">
        <div class="panel-title"><i data-lucide="edit-3"></i> Input Custom Corporate Metrics</div>
        <div class="input-grid">
            <div class="input-group"><label>Raw Leads Generated</label><input type="number" id="p1-leads" value="2500"></div>
            <div class="input-group"><label>Product Demo Calls Held</label><input type="number" id="p1-demos" value="600"></div>
            <div class="input-group"><label>Deals Closed</label><input type="number" id="p1-closes" value="180"></div>
            <div class="input-group"><label>Total Marketing Budget (₹)</label><input type="number" id="p1-spend" value="150000"></div>
        </div>
        <button class="action-btn" onclick="runDynamicProject1()"><i data-lucide="play"></i> Compute & Parse with Gemini Layer</button>
        <div id="p1-output" class="output-box"></div>
    </div>
</div>
<script>
    lucide.createIcons();
    function runDynamicProject1() {
        const leads = parseFloat(document.getElementById('p1-leads').value) || 0;
        const demos = parseFloat(document.getElementById('p1-demos').value) || 0;
        const closes = parseFloat(document.getElementById('p1-closes').value) || 0;
        const spend = parseFloat(document.getElementById('p1-spend').value) || 0;

        const leadToDemo = ((demos / leads) * 100).toFixed(2);
        const demoToWin = ((closes / demos) * 100).toFixed(2);
        const cac = (spend / closes).toFixed(2);

        const payload = {
            "executive_summary": `The inputted operational batch processed a top-of-funnel flow of ${leads.toLocaleString()} raw leads, converting smoothly into active sales engagement channels. Unit economics remain highly sustainable based on localized spending baselines.`,
            "realtime_calculated_kpis": {
                "lead_to_demo_conversion_rate": `${leadToDemo}%`,
                "demo_to_deal_win_rate": `${demoToWin}%`,
                "customer_acquisition_cost_cac": `₹${parseFloat(cac).toLocaleString()}`
            },
            "automated_strategic_insights": [
                `Your team is maintaining a closing efficiency index of ${demoToWin}% once software demonstrations are locked.`,
                `Securing a single closed client contract currently demands an aggressive marketing overhead run-rate of ₹${parseFloat(cac).toLocaleString()}.`
            ],
            "presentation_slide_outline": {
                "slide_1": "Macro Conversion Pipeline & Flow Analysis Overview",
                "slide_2": `Acquisition Costs Deep-Dive (Current Target: ₹${parseFloat(cac).toLocaleString()} per client)`,
                "slide_3": "Operational Velocity Recommendations Summary"
            }
        };

        const out = document.getElementById('p1-output');
        out.style.display = 'block';
        out.innerText = "[SYSTEM MESSAGE: Parsing active data variables via Structured JSON parameters...]\n\n" + JSON.stringify(payload, null, 4);
    }
</script>
</body>
</html>
